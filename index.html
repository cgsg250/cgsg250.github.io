<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Информационная карточка</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: rgba(56, 189, 248, 0.15);
            --accent-border: #38bdf8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Эффект мягкой подсветки всей карточки при наведении */
        .card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-border);
            box-shadow: 0 10px 25px -5px var(--accent-glow), 0 8px 10px -6px var(--accent-glow);
        }

        .card-tag {
            display: inline-block;
            background-color: #334155;
            color: var(--accent-border);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin: 0 0 12px 0;
            line-height: 1.4;
        }

        .card-description {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #334155;
            padding-top: 16px;
            font-size: 0.85rem;
        }

        .author {
            color: var(--text-main);
            font-weight: 500;
        }

        .card-link {
            color: var(--accent-border);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s ease;
        }

        .card-link:hover {
            text-decoration: underline;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="card-tag">Документация</div>
        <h2 class="card-title">Информационный блок</h2>
        <p class="card-description">
            Здесь находится основное описание вашей карточки. Весь интерфейс подсвечивается при наведении курсора для лучшего визуального отклика.
        </p>
        <div class="card-footer">
            <span class="author">Автор: cgsg250</span>
            <a href="https://example.com" class="card-link" target="_blank">Перейти →</a>
        </div>
    </div>

</body>
</html>
